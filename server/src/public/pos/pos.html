<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ODOOCAFE — Point of Sale</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="pos.css" />
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap" rel="stylesheet">
  <!-- Matter.js Physics Engine -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <!-- GSAP & ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body class="pos-layout">

  <!-- Custom Cursor specific for dashboard if needed -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursor-follower"></div>

  <!-- Header -->
  <header class="pos-header">
    <div class="nav-logo pos-logo">ODOO<span>.</span>CAFE <span class="badge">POS</span></div>
    <div class="pos-header-actions">
      <div class="search-bar">
        <input type="text" id="product-search" placeholder="Search menu items..." />
        <select id="price-filter" class="filter-select">
          <option value="all">All Prices</option>
          <option value="20">Under $20</option>
          <option value="50">Under $50</option>
          <option value="100">Under $100</option>
        </select>
      </div>
      <a href="dashboard.html" class="btn-pos-outline">Dashboard</a>
      <div class="user-avatar">A</div>
    </div>
  </header>

  <main class="pos-main-container">
    <!-- Menu Grids (Left Side) -->
    <section class="pos-menu">
      <div class="category-tabs" id="category-tabs">
        <button class="cat-btn active" data-id="all">All</button>
        <!-- Categories will be injected here -->
      </div>

      <div class="menu-items-grid" id="menu-items-grid">
        <!-- Menu items will be injected here -->
      </div>
    </section>

    <!-- Receipt / Cart (Right Side) -->
    <aside class="pos-cart">
      <div class="cart-header">
        <h2>Current Order</h2>
        <div class="order-id">#OD-1046</div>
      </div>
      
      <div class="cart-items" id="cart-items">
        <!-- Items will be injected here -->
        <div class="cart-item selected">
          <div class="cart-item-info">
            <div class="item-main">
              <span class="item-qty">1</span>
              <span class="item-multiplier">x</span>
              <span class="item-title">Burger</span>
            </div>
          </div>
          <div class="item-price">$15</div>
        </div>
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="item-main">
              <span class="item-qty">2</span>
              <span class="item-multiplier">x</span>
              <span class="item-title">Pizza</span>
            </div>
          </div>
          <div class="item-price">$15</div>
        </div>
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="item-main">
              <span class="item-qty">2</span>
              <span class="item-multiplier">x</span>
              <span class="item-title">Cofee</span>
            </div>
            <div class="item-notes">Notes: Less Suger</div>
          </div>
          <div class="item-price">$15</div>
        </div>
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="item-main">
              <span class="item-qty">1</span>
              <span class="item-multiplier">x</span>
              <span class="item-title">Water</span>
            </div>
          </div>
          <div class="item-price">$15</div>
        </div>
      </div>

      <div class="cart-summary">
        <div class="summary-line">
          <span>Subtotal</span>
          <span>$16.10</span>
        </div>
        <div class="summary-line">
          <span>Tax (8%)</span>
          <span>$1.28</span>
        </div>
        <div class="summary-line total">
          <span>Total</span>
          <span>$17.38</span>
        </div>

        <div class="payment-methods">
          <button class="pay-btn pay-card">💳 Card</button>
          <button class="pay-btn pay-cash">💵 Cash</button>
          <button class="pay-btn pay-mobile">📱 QR Pay</button>
        </div>

        <button class="btn-checkout">Complete Checkout →</button>
      </div>
    </aside>
  </main>

  <script src="pos.js"></script>
  <script src="app.js"></script>
</body>
</html>
